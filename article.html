        /* Sticky Footer Flex Framework Integration */
        html, body {
            height: 100%;
            margin: 0;
        }
        body {
            display: flex;
            flex-direction: column;
        }
        .main-content-wrapper {
            flex: 1 0 auto;
        }
        footer {
            flex-shrink: 0;
            margin-top: auto;
        }

        /* Loading Spinner CSS Animations */
        @keyframes articleSpin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .loading-spinner-circle {
            width: 40px;
            height: 40px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #111;
            border-radius: 50%;
            animation: articleSpin 1s linear infinite;

        }
    </style>
</head>

    <!-- Main Content wrapper containing both layout states -->
    <div class="main-content-wrapper">
        
        <!-- Standardized Full-Page Loading State Element -->
        <div id="articleLoadingState" style="display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 100px 20px; color: #777; font-family: sans-serif;">
            <div class="loading-spinner-circle"></div>
            <div>Načítám článek z databáze...</div>
        </div>

        <!-- The main workspace remains hidden until Firestore payload drops in -->
        <div class="container" id="articleWorkspace" style="display: none; margin-top: 20px;">
            <div class="breadcrumbs">
                <a href="index.html">Deník.GR</a> &gt; <a href="#" class="categorySwap">Category</a>
            </div>

            <div class="article-grid">
                
                <main class="article-body">
                    <article>
                        <header class="article-header">
                            <span class="category categorySwap">Category</span>
                            <h1 class="article-title">Title</h1>
                            <div class="meta">
                                <span class="author">Author</span> &bull; 
                                <span class="date">Date</span>
                            </div>
                        </header>

                        <div class="featured-image-container" id="mainCoverContainer">
                            <img src="" alt="Cover" id="mainCoverImg">

                        </div>

                </main>

    <footer>

        </div>

    <button class="theme-toggle-btn" id="themeToggleBtn" aria-label="Přepnout tmavý režim">🌙</button>

    <script>
        const toggleBtn = document.getElementById('themeToggleBtn');
        
        // 1. Check local storage or system preference on load
        const savedTheme = localStorage.getItem('theme');
        const systemPrefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        
        if (savedTheme === 'dark' || (!savedTheme && systemPrefersDark)) {
            document.documentElement.setAttribute('data-theme', 'dark');
            toggleBtn.innerText = '☀️';
        } else {
            document.documentElement.setAttribute('data-theme', 'light');
            toggleBtn.innerText = '🌙';
        }

        // 2. Listen for clicks to flip the state
        toggleBtn.addEventListener('click', () => {
            const currentTheme = document.documentElement.getAttribute('data-theme');
            let newTheme = 'light';
            
            if (currentTheme === 'light') {
                newTheme = 'dark';
                toggleBtn.innerText = '☀️';
            } else {
                toggleBtn.innerText = '🌙';
            }
            
            document.documentElement.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
        });
    </script>
