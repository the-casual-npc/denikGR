    <style>
        /* Small styling adjustments specific to a category feed view */
        .category-title-header {
            border-bottom: 3px solid var(--text-color);
            padding-bottom: 10px;
            margin-bottom: 30px;
            text-transform: uppercase;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            font-size: 2rem;
            color: var(--text-color);
            transition: color 0.3s ease, border-color 0.3s ease;
        }
        .category-feed-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 30px;
        }
        @media (min-width: 600px) {
            .category-feed-grid {
                grid-template-columns: 1fr 1fr;
            }
        }

        /* Variables used for dynamic layout loaders */
        .category-loader-wrap {
            grid-column: 1/-1; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            padding: 60px 0; 
            color: var(--meta-text); 
            font-family: sans-serif;
        }
        .spinner {
            width: 40px; 
            height: 40px; 
            border: 4px solid var(--border-color); 
            border-top: 4px solid var(--link-hover); 
            border-radius: 50%; 
            animation: spin 1s linear infinite; 
            margin-bottom: 15px;
        }
        @keyframes spin { 
            0% { transform: rotate(0deg); } 
            100% { transform: rotate(360deg); } 
        }
    </style>
</head>
<body>

    <header>
        <div class="header-top container">

            </ul>
        </nav>
    </header>

    <main class="container" style="margin-top: 30px; margin-bottom: 60px;">
        <h1 class="category-title-header" id="categoryHeaderName">Načítám kategorii...</h1>
        
        <div class="category-feed-grid" id="categoryFeedContainer">
            <div class="category-loader-wrap">
                <div class="spinner"></div>
                <div>Načítám nejnovější příspěvky...</div>

    <button class="theme-toggle-btn" id="themeToggleBtn" aria-label="Přepnout tmavý režim">🌙</button>

    <script>
        const toggleBtn = document.getElementById('themeToggleBtn');
        
        // 1. Check local storage or system preference on load
        const savedTheme = localStorage.getItem('theme');
        const systemPrefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        
        if (savedTheme === 'dark' || (!savedTheme && systemPrefersDark)) {
            document.documentElement.setAttribute('data-theme', 'dark');
            toggleBtn.innerText = '☀️';
        } else {
            document.documentElement.setAttribute('data-theme', 'light');
            toggleBtn.innerText = '🌙';
        }

        // 2. Listen for clicks to flip the state
        toggleBtn.addEventListener('click', () => {
            const currentTheme = document.documentElement.getAttribute('data-theme');
            let newTheme = 'light';
            
            if (currentTheme === 'light') {
                newTheme = 'dark';
                toggleBtn.innerText = '☀️';
            } else {
                toggleBtn.innerText = '🌙';
            }
            
            document.documentElement.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
        });
    </script>
