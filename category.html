            text-transform: uppercase;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;

            color: #111;
        }
        .category-feed-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 30px;
        }
        @media (min-width: 600px) {
            .category-feed-grid {
                grid-template-columns: 1fr 1fr;
            }
        }
