    <main class="container">
        <div class="editor-container">
            <h2>Kompilátor Článků</h2>
            <p class="editor-sub-notice">Editor pro přidání nového článku. Články mohou psát pouze vybraní uživatelé.</p>
            
            <form id="modularArticleForm">
                <div class="form-group">
                    <label>Název Článku</label>
                    <input type="text" id="title" required placeholder="Např. Obchodní dům v plamenech kvůli creeperovi...">
                </div>

                <div class="form-group">
                    <label>Kategorie</label>
                    <div class="category-select-wrapper">
                        <select id="category" required>
                            <option value="Aktuality">Aktuality</option>
                            <option value="Obchody">Obchody</option>
                            <option value="Doprava">Doprava</option>
                            <option value="Události">Události</option>
                            <option value="Diskuze">Diskuze</option>
                        </select>
                    </div>
                </div>
                <div class="form-group">
                    <label>Vybrat Hlavní Náhledový Obrázek</label>
                    <input type="file" id="coverImageFile" accept="image/*" class="file-upload-input" required>
                </div>

                <div class="form-group">
                    <label>Popisek náhledového obrázku</label>
                    <input type="text" id="coverCaption" required placeholder="Např. Pohled na zničenou bránu obchodu z dnešního rána">
                </div>

                <h3 class="modules-workspace-header">Obsahové Moduly Článku</h3>
                <div class="blocks-workspace" id="blocksWorkspace"></div>

                <div class="polished-control-panel">
                    <div class="panel-title">Vložit nový element na konec článku</div>
                    <div class="button-action-group">
                        <button type="button" class="action-node-btn type-p" onclick="createBlockNode('paragraph')">
                            <span>📝</span> Odstavec textu
                        </button>
                        <button type="button" class="action-node-btn type-img" onclick="createBlockNode('image')">
                            <span>📷</span> Obrázek z terénu
                        </button>
                        <button type="button" class="action-node-btn type-quote" onclick="createBlockNode('blockquote')">
                            <span>💬</span> Výpověď / Citace
                        </button>
                    </div>
                </div>

                <button type="submit" class="submit-btn">Zveřejnit článek</button>
            </form>
        </div>
    </main>

    <footer>
        <div class="container">
            <p>2026 Deník.GR. Žádná práva nevyhrazena.</p>

    <button class="theme-toggle-btn" id="themeToggleBtn" aria-label="Přepnout tmavý režim">🌙</button>

    <script>
        const toggleBtn = document.getElementById('themeToggleBtn');
        const savedTheme = localStorage.getItem('theme');
        const systemPrefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        
        if (savedTheme === 'dark' || (!savedTheme && systemPrefersDark)) {
            document.documentElement.setAttribute('data-theme', 'dark');
            toggleBtn.innerText = '☀️';
        } else {
            document.documentElement.setAttribute('data-theme', 'light');
            toggleBtn.innerText = '🌙';
        }

        toggleBtn.addEventListener('click', () => {
            const currentTheme = document.documentElement.getAttribute('data-theme');
            let newTheme = 'light';
            
            if (currentTheme === 'light') {
                newTheme = 'dark';
                toggleBtn.innerText = '☀️';
            } else {
                toggleBtn.innerText = '🌙';
            }
            
            document.documentElement.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
        });
    </script>
