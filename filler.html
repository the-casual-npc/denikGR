            return db.collection("articles").doc(id).set(additionalArticles[id])

                .catch(err => console.error(`Chyba u článku ${id}:`, err));

        // 4. Run feedback notice when all writes complete
        Promise.all(promises).then(() => {
            console.log("Všech 5 nových článků bylo nahráno do databáze!");
